<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Paneli | Nova Cast</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f1016; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .login-card { background-color: #161824; border: 1px solid #23273a; border-radius: 16px; padding: 40px; }
        .form-control { background-color: #0f1016; border: 1px solid #23273a; color: white; }
        .form-control:focus { background-color: #0f1016; border-color: #ff4a5a; color: white; box-shadow: none; }
        .btn-brand { background-color: #ff4a5a; color: white; font-weight: 600; }
        .btn-brand:hover { background-color: #e03544; color: white; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5">
            <div class="login-card shadow-lg">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white"><span style="color: #ff4a5a;">NOVA</span> CAST</h2>
                    <p class="text-muted">Yönetim Paneli Girişi</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-danger border-0 bg-dark text-danger text-center py-2">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Kullanıcı Adı</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-muted"><i class="fa-solid fa-user"></i></span>
                            <input type="text" name="kullanici_adi" class="form-control" placeholder="Örn: admin" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Şifre</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" name="sifre" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-brand w-100 py-2 mb-3"><i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Giriş Yap</button>
                    <a href="/" class="btn btn-outline-secondary w-100 py-2 text-muted"><i class="fa-solid fa-house me-2"></i>Sanal Siteden Çık</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
