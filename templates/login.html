<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Cast Ajans - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa !important;
            color: #1a1a1a !important;
            font-family: 'Inter', sans-serif !important;
        }
        .navbar {
            background-color: #0f172a !important;
        }
        .navbar-brand {
            color: #ffffff !important;
            font-weight: 800 !important;
        }
        .nav-link {
            color: #e2e8f0 !important;
            font-weight: 600 !important;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 2.5rem;
        }
        h2 {
            color: #0b0c10 !important;
            font-weight: 800 !important;
        }
        label {
            color: #0f172a !important;
            font-weight: 700 !important;
            margin-bottom: 0.5rem;
        }
        .form-control {
            color: #0f172a !important;
            font-weight: 600 !important;
            border: 2px solid #94a3b8 !important;
            background-color: #ffffff !important;
        }
        .form-control:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25) !important;
        }
        .btn-primary {
            background-color: #2563eb !important;
            border-color: #2563eb !important;
            font-weight: 700 !important;
            padding: 0.75rem !important;
        }
        .btn-primary:hover {
            background-color: #1d4ed8 !important;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">🎭 Nova Cast Ajans</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bildirim Mesajları -->
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show fw-bold" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- Giriş Formu -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card">
                    <h2 class="text-center mb-4">Giriş Yap</h2>
                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label for="kullanici_adi">Kullanıcı Adı</label>
                            <input type="text" class="form-control" id="kullanici_adi" name="kullanici_adi" required autocomplete="off">
                        </div>
                        <div class="mb-4">
                            <label for="sifre">Şifre</label>
                            <input type="password" class="form-control" id="sifre" name="sifre" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
