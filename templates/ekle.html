<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yeni Cast Ekle | Nova Cast</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f1016; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .form-card { background-color: #161824; border: 1px solid #23273a; border-radius: 16px; padding: 40px; }
        .form-control { background-color: #0f1016; border: 1px solid #23273a; color: white; }
        .form-control:focus { background-color: #0f1016; border-color: #ff4a5a; color: white; box-shadow: none; }
        .btn-brand { background-color: #ff4a5a; color: white; font-weight: 600; }
        .btn-brand:hover { background-color: #e03544; color: white; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="col-lg-8 mx-auto">
            <div class="form-card shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
                    <h2 class="fw-bold text-white mb-0"><i class="fa-solid fa-user-plus text-danger me-2"></i>Yeni Oyuncu Ekle</h2>
                    <a href="/" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-house"></i></a>
                </div>
                
                <form action="/ekle" method="POST">
                    <h5 class="text-white mb-3"><i class="fa-solid fa-id-card text-danger me-2"></i>Kişisel Bilgiler</h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Adı Soyadı</label>
                        <input type="text" name="isim" class="form-control" placeholder="Oyuncunun Tam Adı" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Yaş</label>
                            <input type="number" name="yas" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Cinsiyet</label>
                            <input type="text" name="cinsiyet" class="form-control" placeholder="Kadın / Erkek" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Boy (cm)</label>
                            <input type="number" name="boy" class="form-control" placeholder="Örn: 178">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Kilo (kg)</label>
                            <input type="number" name="kilo" class="form-control" placeholder="Örn: 72">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Göz Rengi</label>
                            <input type="text" name="goz_rengi" class="form-control" placeholder="Kahverengi, Mavi vb.">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Saç Rengi</label>
                            <input type="text" name="sac_rengi" class="form-control" placeholder="Siyah, Kumral vb.">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Yaşadığı Şehir</label>
                        <input type="text" name="sehir" class="form-control" placeholder="İstanbul, Kocaeli, Ankara vb.">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Telefon Numarası</label>
                            <input type="text" name="telefon" class="form-control" placeholder="05xx xxx xx xx">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">E-Posta Adresi</label>
                            <input type="email" name="eposta" class="form-control" placeholder="isim@eposta.com">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Deneyim ve Biyografi</label>
                        <textarea name="deneyim" class="form-control" rows="3" placeholder="Yer aldığı projeler..."></textarea>
                    </div>

                    <!-- BURASI YENİ: Oyuncu Hesap Bilgileri Alanı -->
                    <h5 class="text-white mb-3 border-top border-secondary pt-3"><i class="fa-solid fa-key text-danger me-2"></i>Oyuncu Hesap Giriş Bilgileri</h5>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Giriş Kullanıcı Adı (Sadece bu oyuncuya özel)</label>
                            <input type="text" name="kullanici_adi" class="form-control" placeholder="Örn: cagla_demir" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Şifre</label>
                            <input type="password" name="sifre" class="form-control" placeholder="Oyuncunun şifresi" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-outline-secondary px-4">Vazgeç</a>
                        <button type="submit" class="btn btn-brand px-4">Kaydet ve Yayınla</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
