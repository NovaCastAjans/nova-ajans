<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Cast Ajans - Oyuncu Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10 !important;
            color: #f1f5f9 !important;
            font-family: 'Inter', sans-serif !important;
        }
        .navbar {
            background-color: #0f172a !important;
        }
        .navbar-brand {
            color: #ffffff !important;
            font-weight: 800 !important;
        }
        .nav-link {
            color: #e2e8f0 !important;
            font-weight: 600 !important;
        }
        .ekle-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            padding: 2.5rem;
        }
        h2 {
            color: #ffffff !important;
            font-weight: 800 !important;
        }
        label {
            color: #cbd5e1 !important;
            font-weight: 700 !important;
            margin-bottom: 0.5rem;
        }
        .form-control, .form-select {
            color: #ffffff !important;
            font-weight: 600 !important;
            border: 2px solid #334155 !important;
            background-color: #1e293b !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2563eb !important;
            background-color: #1e293b !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25) !important;
        }
        .section-title {
            color: #3b82f6 !important;
            font-weight: 700 !important;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .btn-success {
            background-color: #16a34a !important;
            border-color: #16a34a !important;
            font-weight: 700 !important;
            padding: 0.75rem !important;
        }
        .btn-success:hover {
            background-color: #15803d !important;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">🎭 NOVA CAST AJANS</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Çıkış Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Form -->
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="ekle-card">
                    <h2 class="mb-4 text-center">Yeni Oyuncu Kaydı</h2>
                    
                    <!-- ENCTYPE ÖZELLİĞİ EKLENDİ (Dosya gönderimi için zorunlu) -->
                    <form action="/ekle" method="post" enctype="multipart/form-data">
                        
                        <!-- 1. Bölüm: Kişisel Bilgiler -->
                        <h4 class="section-title">Kişisel Bilgiler</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="isim">Adı Soyadı</label>
                                <input type="text" class="form-control" id="isim" name="isim" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="yas">Yaş</label>
                                <input type="number" class="form-control" id="yas" name="yas">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="cinsiyet">Cinsiyet</label>
                                <select class="form-select" id="cinsiyet" name="cinsiyet">
                                    <option value="">Seçiniz</option>
                                    <option value="Kadın">Kadın</option>
                                    <option value="Erkek">Erkek</option>
                                    <option value="Diğer">Diğer</option>
                                </select>
                            </div>
                        </div>

                        <!-- 2. Bölüm: Fiziksel Özellikler -->
                        <h4 class="section-title mt-4">Fiziksel Özellikler</h4>
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label for="boy">Boy (cm)</label>
                                <input type="number" class="form-control" id="boy" name="boy">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="kilo">Kilo (kg)</label>
                                <input type="number" class="form-control" id="kilo" name="kilo">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="goz_rengi">Göz Rengi</label>
                                <input type="text" class="form-control" id="goz_rengi" name="goz_rengi">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="sac_rengi">Saç Rengi</label>
                                <input type="text" class="form-control" id="sac_rengi" name="sac_rengi">
                            </div>
                        </div>

                        <!-- 3. Bölüm: İletişim ve Konum -->
                        <h4 class="section-title mt-4">İletişim ve Konum</h4>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="sehir">Yaşadığı Şehir</label>
                                <input type="text" class="form-control" id="sehir" name="sehir">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="telefon">Telefon Numarası</label>
                                <input type="tel" class="form-control" id="telefon" name="telefon">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="eposta">E-posta Adresi</label>
                                <input type="email" class="form-control" id="eposta" name="eposta">
                            </div>
                        </div>

                        <!-- 4. Bölüm: Giriş Bilgileri ve Fotoğraf -->
                        <h4 class="section-title mt-4">Giriş Bilgileri ve Fotoğraf</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="kullanici_adi">Kullanıcı Adı (Oyuncu girişi için)</label>
                                <input type="text" class="form-control" id="kullanici_adi" name="kullanici_adi" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="sifre">Şifre</label>
                                <input type="text" class="form-control" id="sifre" name="sifre" required>
                            </div>
                            <!-- name="resim" DEĞERİ FLASK'TAKİ ALANLA EŞLENDİ -->
                            <div class="col-md-12 mb-3">
                                <label for="resim" class="form-label">Profil Fotoğrafı</label>
                                <input class="form-control" type="file" id="resim" name="resim" accept="image/*">
                            </div>
                        </div>

                        <!-- 5. Bölüm: Deneyim -->
                        <h4 class="section-title mt-4">Deneyim / Özgeçmiş</h4>
                        <div class="mb-4">
                            <textarea class="form-control" id="deneyim" name="deneyim" rows="4" placeholder="Daha önce yer aldığı projeleri, eğitimleri buraya yazabilirsiniz..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mt-2">Kaydet ve Oyuncuyu Ekle</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
