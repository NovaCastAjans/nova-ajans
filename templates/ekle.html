<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Oyuncu Ekle - Nova Cast Ajans</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="card shadow p-4" style="max-width: 600px; margin: 0 auto;">
            <h2 class="mb-4">Yeni Oyuncu Ekle</h2>
            <form action="/ekle" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Adı Soyadı</label>
                    <input type="text" name="isim" class="form-control" required>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Yaş</label>
                        <input type="number" name="yas" class="form-control">
                    </div>
                    <div class="col">
                        <label class="form-label">Cinsiyet</label>
                        <input type="text" name="cinsiyet" class="form-control">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Boy (cm)</label>
                        <input type="number" name="boy" class="form-control">
                    </div>
                    <div class="col">
                        <label class="form-label">Kilo (kg)</label>
                        <input type="number" name="kilo" class="form-control">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Göz Rengi</label>
                        <input type="text" name="goz_rengi" class="form-control">
                    </div>
                    <div class="col">
                        <label class="form-label">Saç Rengi</label>
                        <input type="text" name="sac_rengi" class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Şehir</label>
                    <input type="text" name="sehir" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefon</label>
                    <input type="text" name="telefon" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">E-Posta</label>
                    <input type="email" name="eposta" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Deneyim / Özgeçmiş</label>
                    <textarea name="deneyim" class="form-control" rows="3"></textarea>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-secondary">Vazgeç</a>
                    <button type="submit" class="btn btn-success">Oyuncuyu Kaydet</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
