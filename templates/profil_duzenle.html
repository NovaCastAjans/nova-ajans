<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profili Düzenle | Nova Cast</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f1016; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .form-card { background-color: #161824; border: 1px solid #23273a; border-radius: 16px; padding: 40px; }
        .form-control { background-color: #0f1016; border: 1px solid #23273a; color: white; }
        .form-control:focus { background-color: #0f1016; border-color: #ff4a5a; color: white; box-shadow: none; }
        .btn-brand { background-color: #ff4a5a; color: white; font-weight: 600; }
        .btn-brand:hover { background-color: #e03544; color: white; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="col-lg-8 mx-auto">
            <div class="form-card shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
                    <h2 class="fw-bold text-white mb-0"><i class="fa-solid fa-user-pen text-danger me-2"></i>Bilgilerimi Güncelle</h2>
                    <a href="/oyuncu/{{ oyuncu.id }}" class="btn btn-outline-light btn-sm"><i class="fa-solid fa-arrow-left me-1"></i>Vazgeç</a>
                </div>
                
                <!-- enctype eklendi, böylece güncellemede de resim dosyası gönderilebilir -->
                <form action="/profil/duzenle/{{ oyuncu.id }}" method="POST" enctype="multipart/form-data">
                    
                    <!-- YENİ: Profil Fotoğrafını Güncelleme Alanı -->
                    <div class="mb-4 bg-dark p-3 rounded border border-secondary">
                        <label class="form-label text-white small fw-bold"><i class="fa-solid fa-image text-danger me-2"></i>Profil Fotoğrafını Değiştir</label>
                        <input type="file" name="resim" class="form-control" accept="image/*">
                        {% if oyuncu.resim_url %}
                            <div class="form-text text-info mt-1">Mevcut bir fotoğrafınız var. Değiştirmek istemiyorsanız boş bırakın.</div>
                        {% endif %}
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Yaş</label>
                            <input type="number" name="yas" class="form-control" value="{{ oyuncu.yas }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Şehir</label>
                            <input type="text" name="sehir" class="form-control" value="{{ oyuncu.sehir }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Boy (cm)</label>
                            <input type="number" name="boy" class="form-control" value="{{ oyuncu.boy }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Kilo (kg)</label>
                            <input type="number" name="kilo" class="form-control" value="{{ oyuncu.kilo }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Göz Rengi</label>
                            <input type="text" name="goz_rengi" class="form-control" value="{{ oyuncu.goz_rengi }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Saç Rengi</label>
                            <input type="text" name="sac_rengi" class="form-control" value="{{ oyuncu.sac_rengi }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Telefon Numarası</label>
                            <input type="text" name="telefon" class="form-control" value="{{ oyuncu.telefon }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">E-Posta Adresi</label>
                            <input type="email" name="eposta" class="form-control" value="{{ oyuncu.eposta }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Deneyim ve Biyografi</label>
                        <textarea name="deneyim" class="form-control" rows="4">{{ oyuncu.deneyim }}</textarea>
                    </div>

                    <div class="mb-4 border-top border-secondary pt-3">
                        <h5 class="text-white mb-3">Hesap Güvenliği</h5>
                        <label class="form-label text-muted small fw-bold">Şifre Değiştir</label>
                        <input type="password" name="sifre" class="form-control" value="{{ oyuncu.sifre }}" placeholder="Yeni Şifre Belirleyin" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/oyuncu/{{ oyuncu.id }}" class="btn btn-outline-secondary px-4">İptal</a>
                        <button type="submit" class="btn btn-brand px-4">Değişiklikleri Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
