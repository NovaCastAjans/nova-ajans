<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Cast Ajans - Profil Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa !important;
            color: #1a1a1a !important;
            font-family: 'Inter', sans-serif !important;
        }
        .navbar {
            background-color: #0f172a !important;
        }
        .navbar-brand {
            color: #ffffff !important;
            font-weight: 800 !important;
        }
        .nav-link {
            color: #e2e8f0 !important;
            font-weight: 600 !important;
        }
        .duzenle-card {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 2.5rem;
        }
        h2 {
            color: #0b0c10 !important;
            font-weight: 800 !important;
        }
        label {
            color: #0f172a !important;
            font-weight: 700 !important;
            margin-bottom: 0.5rem;
        }
        .form-control, .form-select {
            color: #0f172a !important;
            font-weight: 600 !important;
            border: 2px solid #94a3b8 !important;
            background-color: #ffffff !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25) !important;
        }
        .section-title {
            color: #2563eb !important;
            font-weight: 700 !important;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background-color: #2563eb !important;
            border-color: #2563eb !important;
            font-weight: 700 !important;
            padding: 0.75rem !important;
        }
        .btn-primary:hover {
            background-color: #1d4ed8 !important;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">🎭 Nova Cast Ajans</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Çıkış Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Düzenleme Formu -->
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="duzenle-card">
                    <h2 class="mb-4 text-center">{{ oyuncu.isim }} - Profili Güncelle</h2>
                    <form action="/profil/duzenle/{{ oyuncu.id }}" method="post" enctype="multipart/form-data">
                        
                        <!-- 1. Bölüm: Fiziksel Özellikler -->
                        <h4 class="section-title">Fiziksel Özellikler</h4>
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label for="yas">Yaş</label>
                                <input type="number" class="form-control" id="yas" name="yas" value="{{ oyuncu.yas or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="boy">Boy (cm)</label>
                                <input type="number" class="form-control" id="boy" name="boy" value="{{ oyuncu.boy or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="kilo">Kilo (kg)</label>
                                <input type="number" class="form-control" id="kilo" name="kilo" value="{{ oyuncu.kilo or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="goz_rengi">Göz Rengi</label>
                                <input type="text" class="form-control" id="goz_rengi" name="goz_rengi" value="{{ oyuncu.goz_rengi or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="sac_rengi">Saç Rengi</label>
                                <input type="text" class="form-control" id="sac_rengi" name="sac_rengi" value="{{ oyuncu.sac_rengi or '' }}">
                            </div>
                        </div>

                        <!-- 2. Bölüm: İletişim ve Konum -->
                        <h4 class="section-title mt-4">İletişim ve Konum</h4>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="sehir">Yaşadığı Şehir</label>
                                <input type="text" class="form-control" id="sehir" name="sehir" value="{{ oyuncu.sehir or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="telefon">Telefon Numarası</label>
                                <input type="tel" class="form-control" id="telefon" name="telefon" value="{{ oyuncu.telefon or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="eposta">E-posta Adresi</label>
                                <input type="email" class="form-control" id="eposta" name="eposta" value="{{ oyuncu.eposta or '' }}">
                            </div>
                        </div>

                        <!-- 3. Bölüm: Şifre ve Fotoğraf Değişikliği -->
                        <h4 class="section-title mt-4">Güvenlik ve Fotoğraf</h4>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="sifre">Giriş Şifresi</label>
                                <input type="text" class="form-control" id="sifre" name="sifre" value="{{ oyuncu.sifre or '' }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="resim" class="form-label">Profil Fotoğrafını Güncelle (Değiştirmek istemiyorsanız boş bırakın)</label>
                                <input class="form-control" type="file" id="resim" name="resim" accept="image/*">
                            </div>
                        </div>

                        <!-- 4. Bölüm: Deneyim -->
                        <h4 class="section-title mt-4">Deneyim / Özgeçmiş</h4>
                        <div class="mb-4">
                            <textarea class="form-control" id="deneyim" name="deneyim" rows="5">{{ oyuncu.deneyim or '' }}</textarea>
                        </div>

                        <div class="row mt-4">
                            <div class="col-6">
                                <a href="/oyuncu/{{ oyuncu.id }}" class="btn btn-secondary w-100 py-2 fw-bold">İptal Et</a>
                            </div>
                            <div class="col-6">
                                <button type="submit" class="btn btn-primary w-100 py-2">Değişiklikleri Kaydet</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
