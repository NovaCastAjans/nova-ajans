<!DOCTYPE html>
<html lang="tr">
<head>
    <title>Ajansa Katıl - Nova Cast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
    <div class="container max-width-600">
        <h2>Ajansımıza Katıl</h2>
        <form method="POST">
            <input type="text" name="isim" class="form-control mb-2" placeholder="Ad Soyad" required>
            <input type="number" name="yas" class="form-control mb-2" placeholder="Yaş">
            <input type="number" name="boy" class="form-control mb-2" placeholder="Boy (cm)">
            <input type="text" name="telefon" class="form-control mb-2" placeholder="Telefon">
            <textarea name="deneyim" class="form-control mb-2" placeholder="Deneyiminiz..."></textarea>
            <button type="submit" class="btn btn-success w-100">Başvurumu Gönder</button>
        </form>
    </div>
</body>
</html>
