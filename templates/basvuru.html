<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ajansa Başvur - Nova Cast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
        body { background: #0b0c10; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); /* Biraz daha belirgin yaptık */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); /* Çerçeveyi belirginleştirdik */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(0, 0, 0, 0.2) !important; /* Arka planı daha koyu yaparak zıtlık oluşturduk */
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #ffffff !important; /* Yazı rengini tam beyaz yaptık */
            border-radius: 10px;
            padding: 12px;
        }
        /* Burası çok önemli: Placeholder yazılarının rengini açtık */
        .form-control::placeholder {
            color: #adb5bd !important;
            opacity: 1;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.3) !important;
            color: #ffffff !important;
            border-color: #3b82f6 !important;
            outline: none;
        }
        .btn-submit {
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    
    <div class="container" style="max-width: 500px;">
        <div class="glass-card">
            <h2 class="text-center mb-4">Yeni Yetenek Başvurusu</h2>
            <p class="text-center text-muted mb-4">Kariyerine bizimle başla.</p>
            <form action="/basvuru" method="POST">
                <input type="text" name="isim" class="form-control mb-3" placeholder="Ad Soyad" required>
                <div class="row">
                    <div class="col"><input type="number" name="yas" class="form-control mb-3" placeholder="Yaş"></div>
                    <div class="col"><input type="number" name="boy" class="form-control mb-3" placeholder="Boy (cm)"></div>
                </div>
                <input type="text" name="telefon" class="form-control mb-3" placeholder="Telefon">
                <textarea name="deneyim" class="form-control mb-3" rows="3" placeholder="Oyunculuk deneyiminizden kısaca bahsedin..."></textarea>
                <button type="submit" class="btn btn-primary w-100 btn-submit">Başvuruyu Tamamla</button>
            </form>
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none text-muted small">Ana Sayfaya Dön</a>
            </div>
        </div>
    </div>

</body>
</html>
