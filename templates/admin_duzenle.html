<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Düzenle - Nova Cast Ajans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0c10 !important; color: #f1f5f9 !important; font-family: 'Inter', sans-serif !important; }
        .navbar { background-color: #0f172a !important; border-bottom: 1px solid #1e293b; }
        .navbar-brand { color: #ffffff !important; font-weight: 800 !important; }
        .edit-container { background: #111827; border: 1px solid #1e293b; border-radius: 16px; padding: 3rem; margin-top: 3rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); max-width: 800px; margin-left: auto; margin-right: auto; }
        .form-label { color: #cbd5e1; font-weight: 600; }
        .form-control { background-color: #1e293b !important; border: 1px solid #334155 !important; color: #ffffff !important; }
        .form-control:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25) !important; }
    </style>
</head>
<body>

    <!-- Güncellenmiş Navbar -->
    <nav class="navbar navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand" href="/">🎭 NOVA CAST AJANS - ADMİN PANELİ</a>
            
            <!-- Butonlar kısmı -->
            <div class="d-flex gap-2">
                <!-- Buraya Onay Bekleyenler butonunu ekledim -->
                <a href="{{ url_for('admin_onaylar') }}" class="btn btn-warning btn-sm fw-bold px-3">Bekleyen Onaylar - DENEME</a>
                <a href="/{{ sayfa_adi }}" class="btn btn-outline-light btn-sm fw-bold px-3">Geri Dön</a>
            </div>
        </div>
    </nav>

    <main class="container mb-5">
        <div class="edit-container">
            <h2 class="mb-4 text-white fw-bold">✏️ '{{ sayfa_adi|capitalize }}' Sayfasını Düzenle</h2>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label">Sayfa Başlığı</label>
                    <input type="text" name="baslik" class="form-control form-control-lg" value="{{ veri.baslik }}" required placeholder="Örn: Hakkımızda">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Sayfa İçeriği</label>
                    <textarea name="icerik" class="form-control" rows="15" required placeholder="Sayfada görünecek metni buraya yazın...">{{ veri.icerik }}</textarea>
                    <div class="form-text text-muted mt-2">Not: Enter tuşu ile yaptığınız satır atlamaları sayfada aynen görünecektir.</div>
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">💾 Değişiklikleri Kaydet</button>
                    <a href="/{{ sayfa_adi }}" class="btn btn-secondary px-4 fw-bold">İptal Et</a>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
